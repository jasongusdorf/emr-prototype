<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GusdorfEMR — Test Suite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; background: #f9fafb; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .summary { padding: 16px; border-radius: 8px; margin-bottom: 24px; font-size: 15px; font-weight: 600; }
    .summary.pass { background: #d1fae5; color: #065f46; }
    .summary.fail { background: #fee2e2; color: #991b1b; }
    .suite { margin-bottom: 20px; }
    .suite-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; padding: 8px 12px; background: white; border-radius: 6px; border: 1px solid #e5e7eb; }
    .test { padding: 6px 12px 6px 24px; font-size: 13px; border-bottom: 1px solid #f3f4f6; display: flex; gap: 8px; }
    .test.pass { color: #065f46; }
    .test.fail { color: #991b1b; background: #fef2f2; }
    .test .icon { width: 18px; flex-shrink: 0; }
    .test .error { font-size: 12px; color: #dc2626; margin-top: 4px; font-family: monospace; white-space: pre-wrap; }
    .duration { color: #6b7280; font-size: 12px; margin-left: auto; }
  </style>
</head>
<body>
  <h1>GusdorfEMR Test Suite</h1>
  <div id="summary" class="summary">Running...</div>
  <div id="results"></div>

  <!-- Load app source files (order matters) -->
  <script src="../data.js"></script>
  <script src="../medications.js"></script>
  <script src="../labdata.js"></script>
  <script src="../imagingdata.js"></script>
  <!-- state.js if it exists -->
  <script src="../state.js" onerror="console.log('state.js not found, skipping')"></script>
  <!-- fhir.js if it exists -->
  <script src="../fhir.js" onerror="console.log('fhir.js not found, skipping')"></script>

  <!-- Test framework -->
  <script src="test-framework.js"></script>

  <!-- Test suites -->
  <script src="test-data.js"></script>
  <script src="test-state.js"></script>

  <!-- Run tests -->
  <script>
    TestRunner.run();
  </script>
</body>
</html>
