<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMR — Clinical System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="shell">
  <!-- ===== Sidebar ===== -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <h1>ClinicalEMR</h1>
      <span>Prototype v1.0</span>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Clinical</div>
      <a href="#dashboard" class="nav-item" data-nav="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Patients
      </a>

      <div class="nav-section-label">Tools</div>
      <a href="#" id="nav-calculators" class="nav-item" data-nav="calculators">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/>
          <line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/>
        </svg>
        Calculators
      </a>

      <div class="nav-section-label">Admin</div>
      <a href="#providers" class="nav-item" data-nav="providers">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        Providers
      </a>
    </div>

    <div class="sidebar-footer">
      <span>Plain HTML · localStorage</span>
      <button id="dark-toggle" class="btn-ghost" title="Toggle dark mode">☀️</button>
    </div>
  </nav>

  <!-- ===== Main column ===== -->
  <div id="main">
    <!-- Topbar -->
    <div id="topbar">
      <div id="topbar-title">Loading…</div>
      <div id="topbar-meta"></div>
      <div id="topbar-actions"></div>
    </div>

    <!-- Routed content -->
    <div id="app"></div>
  </div>
</div>

<!-- ===== Shared modal (re-used by all views) ===== -->
<div id="modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal" class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Modal</h2>
      <button class="modal-close" id="modal-close" aria-label="Close modal">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ===== Toast container ===== -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>

<!-- ===== Scripts — load order matters ===== -->
<script src="data.js"></script>
<script src="views/providers.js"></script>
<script src="views/dashboard.js"></script>
<script src="views/chart.js"></script>
<script src="views/encounter.js"></script>
<script src="views/orders.js"></script>
<script src="views/calculators.js"></script>
<script src="app.js"></script>

</body>
</html>
